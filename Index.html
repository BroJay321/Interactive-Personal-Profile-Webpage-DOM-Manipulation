<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="global-controls">
            <button id="resetBtn" class="btn-danger"><i class="fas fa-undo"></i> Reset to Default</button>
        </div>

        <section class="card profile-header">
            <div class="image-container">
                <img id="profilePic" src="https://via.placeholder.com/150" alt="Profile">
                <input type="file" id="fileInput" accept="image/*" hidden>
                <div class="overlay"><i class="fas fa-camera"></i></div>
            </div>
            
            <div class="info">
                <div class="editable-group">
                    <h2 id="userName">Fe Jay Pacay</h2>
                    <button class="edit-btn" data-target="userName"><i class="fas fa-pen"></i></button>
                </div>
                <div class="editable-group">
                    <p id="userBio">Passionate developer and lifelong learner.</p>
                    <button class="edit-btn" data-target="userBio"><i class="fas fa-pen"></i></button>
                </div>
            </div>
        </section>

        <section class="card">
            <h3><i class="fas fa-graduation-cap"></i> Education</h3>
            <div id="educationList"></div>
            <button id="addEduBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Education</button>
        </section>

        <div class="grid">
            <section class="card">
                <h3><i class="fas fa-tools"></i> Skills</h3>
                <div class="list-controls">
                    <button id="addSkillBtn" class="btn-sm">Add</button>
                    <button id="deleteSkillBtn" class="btn-sm btn-danger">Delete Selected</button>
                </div>
                <div id="skillInputContainer" class="hidden">
                    <input type="text" id="newSkillInput" placeholder="Type and press Enter...">
                </div>
                <ul id="skillList" class="draggable-list"></ul>
            </section>

            <section class="card">
                <h3><i class="fas fa-heart"></i> Hobbies</h3>
                <div class="list-controls">
                    <button id="addHobbyBtn" class="btn-sm">Add</button>
                    <button id="deleteHobbyBtn" class="btn-sm btn-danger">Delete Selected</button>
                </div>
                <div id="hobbyInputContainer" class="hidden">
                    <input type="text" id="newHobbyInput" placeholder="Type and press Enter...">
                </div>
                <ul id="hobbyList" class="draggable-list"></ul>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
